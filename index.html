<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Operações com Matrizes</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="app-header">
    <div class="app-header__left">
        <h1 class="app-title">Operações com Matrizes</h1>
    </div>
    <div class="app-header__right">
        <button type="button" class="control-btn" data-action="fullscreen" aria-label="Tela cheia (F)">
            ⛶ Tela Cheia
        </button>
        <button type="button" class="control-btn" data-action="thumbnails" aria-label="Miniaturas (T)">
            ⊞ Miniaturas
        </button>
        <button type="button" class="control-btn" data-action="auto" aria-label="Apresentação automática (A)">
            ▶ Auto
        </button>
    </div>
</header>

<main class="app-main" role="main">
    <section class="slideshow" aria-label="Apresentação de slides: Operações com Matrizes">
        <!-- Contêiner da imagem -->
        <figure class="slide-figure">
            <img
                id="slide-image"
                class="slide-image"
                src="https://skyagent-artifacts.skywork.ai/image/2028908685195108352/6651c77d-b1ad-403a-b621-659e90ca9acd/prod_agent_2028908685195108352/3b5e03d6-5a25-4c4f-b405-41b5c1819a21_1.png"
                alt="Slide 1 - Operações com Matrizes"
            >
            <figcaption id="slide-caption" class="slide-caption">
                1 / 17 — Slide 1 - Operações com Matrizes
            </figcaption>
        </figure>

        <!-- Navegação de slides -->
        <nav class="slide-nav" aria-label="Navegação entre slides">
            <button
                type="button"
                class="nav-btn nav-btn--prev"
                id="prev-slide"
                aria-label="Slide anterior (←)"
            >
                ‹
            </button>

            <div class="slide-counter" aria-live="polite">
                <span id="current-slide">1</span>
                <span>/</span>
                <span id="total-slides">17</span>
            </div>

            <button
                type="button"
                class="nav-btn nav-btn--next"
                id="next-slide"
                aria-label="Próximo slide (→)"
            >
                ›
            </button>
        </nav>
    </section>

    <!-- Miniaturas: opcional (pode ocultar inicialmente) -->
    <section class="thumbnails" id="thumbnails-panel" aria-label="Miniaturas dos slides" hidden>
        <ul class="thumbnails__list">
            <!-- Exemplo: gere estes <li> dinamicamente se quiser, aqui estático para clareza -->
            <li class="thumbnails__item">
                <button type="button" class="thumbnail-btn" data-slide="0">
                    <img src="https://skyagent-artifacts.skywork.ai/image/2028908685195108352/6651c77d-b1ad-403a-b621-659e90ca9acd/prod_agent_2028908685195108352/3b5e03d6-5a25-4c4f-b405-41b5c1819a21_1.png" alt="Miniatura slide 1">
                </button>
            </li>
            <!-- Repita para todos os 17 slides -->
        </ul>
    </section>
</main>

<footer class="app-footer">
    <div class="keyboard-help">
        <span><kbd>←</kbd> <kbd>→</kbd> navegar</span>
        <span>|</span>
        <span><kbd>T</kbd> miniaturas</span>
        <span>|</span>
        <span><kbd>F</kbd> tela cheia</span>
        <span>|</span>
        <span><kbd>A</kbd> auto</span>
        <span>|</span>
        <span><kbd>Esc</kbd> parar</span>
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
